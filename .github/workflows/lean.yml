name: Verify WOWII 145

on:
  push:
    branches:
      - main
    paths-ignore:
      - lean-ci.log
      - lean-source-sha256.txt
      - ci-run-started.txt
      - .github/workflows/lean.yml
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wow145-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Publish run-start marker
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          printf 'run_id=%s\nrun_attempt=%s\nevent=%s\nref=%s\nsha=%s\nstarted_utc=%s\n' \
            '${{ github.run_id }}' '${{ github.run_attempt }}' '${{ github.event_name }}' \
            '${{ github.ref }}' '${{ github.sha }}' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            > ci-run-started.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -f ci-run-started.txt
          git commit -m 'ci: mark Lean verification run started'
          git push origin HEAD:${GITHUB_REF_NAME}

      - name: Install exact Lean toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf \
            https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Resolve pinned dependencies
        run: lake update

      - name: Restore dependency build cache
        uses: actions/cache@v4
        with:
          path: |
            .lake/packages/formal_conjectures/.lake/build
            .lake/packages/wow_146/.lake/build
          key: wow145-dependencies-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lakefile.toml', 'lake-manifest.json') }}

      - name: Download Mathlib cache
        run: lake exe cache get

      - name: Verify and capture compiler log
        id: verify
        shell: bash
        run: |
          set +e
          set -o pipefail
          {
            echo '$ lean --version'
            lean --version
            echo '$ forbidden-token scan'
            if grep -RInP '\b(sorry|admit|native_decide)\b|^[[:space:]]*axiom[[:space:]]' \
                WOW145 WOW145.lean; then
              echo 'Forbidden proof shortcut found.'
              exit 1
            fi
            echo '$ source hashes'
            find WOW145 -type f -name '*.lean' -print0 \
              | sort -z \
              | xargs -0 sha256sum \
              | tee lean-source-sha256.txt
            sha256sum WOW145.lean lean-toolchain lakefile.toml \
              | tee -a lean-source-sha256.txt
            echo '$ lake build WOW145'
            lake build WOW145
            echo '$ lake env lean -DwarningAsError=true WOW145/Audit.lean'
            lake env lean -DwarningAsError=true WOW145/Audit.lean
            echo '$ lake --wfail build'
            lake --wfail build
          } > lean-ci.log 2>&1
          status=$?
          echo "exit_status=$status" >> "$GITHUB_OUTPUT"
          printf '\nEXIT_STATUS=%s\n' "$status" >> lean-ci.log
          exit 0

      - name: Upload verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wowii-145-lean-evidence-${{ github.run_id }}
          path: |
            lean-ci.log
            lean-source-sha256.txt
            lake-manifest.json
            ci-run-started.txt
          if-no-files-found: warn

      - name: Publish compiler log
        if: always() && github.event_name != 'pull_request'
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          test -f lean-ci.log && git add -f lean-ci.log || true
          test -f lean-source-sha256.txt && git add -f lean-source-sha256.txt || true
          git commit -m 'ci: publish Lean verification evidence' || true
          git push origin HEAD:${GITHUB_REF_NAME}

      - name: Fail job when Lean failed
        if: steps.verify.outputs.exit_status != '0'
        run: exit 1
