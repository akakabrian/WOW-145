name: Verify WOWII 145

on:
  push:
    branches:
      - main
    paths-ignore:
      - lean-ci.log
      - lean-source-sha256.txt
      - ci-run-started.txt
      - lean-arm-ci.log
      - lean-arm-source-sha256.txt
      - arm-ci-started.txt
      - .github/workflows/lean.yml
      - .github/workflows/lean-arm.yml
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wow145-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install exact Lean toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf \
            https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Resolve pinned dependencies
        run: lake update

      - name: Restore Formal Conjectures build cache
        uses: actions/cache@v4
        with:
          path: .lake/packages/formal_conjectures/.lake/build
          key: wow145-formal-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lakefile.toml', 'lake-manifest.json') }}

      - name: Download Mathlib cache
        run: lake exe cache get

      - name: Verify and capture compiler log
        id: verify
        shell: bash
        run: |
          set +e
          set -o pipefail
          {
            echo '$ lean --version'
            lean --version
            echo '$ reject Conjecture 146 package references'
            if grep -RInE 'WOW146|wow_146' WOW145 WOW145.lean lakefile.toml; then
              echo 'Residual Conjecture 146 dependency found.'
              exit 1
            fi
            echo '$ forbidden-token scan'
            if grep -RInP '\b(sorry|admit|native_decide)\b|^[[:space:]]*axiom[[:space:]]' \
                WOW145 WOW145.lean; then
              echo 'Forbidden proof shortcut found.'
              exit 1
            fi
            echo '$ source hashes'
            find WOW145 -type f -name '*.lean' -print0 \
              | sort -z \
              | xargs -0 sha256sum \
              | tee lean-source-sha256.txt
            sha256sum WOW145.lean lean-toolchain lakefile.toml \
              | tee -a lean-source-sha256.txt
            echo '$ lake build WOW145'
            lake build WOW145
            echo '$ lake env lean -DwarningAsError=true WOW145/Audit.lean'
            lake env lean -DwarningAsError=true WOW145/Audit.lean
            echo '$ lake --wfail build'
            lake --wfail build
          } > lean-ci.log 2>&1
          status=$?
          echo "exit_status=$status" >> "$GITHUB_OUTPUT"
          printf '\nEXIT_STATUS=%s\n' "$status" >> lean-ci.log
          cat lean-ci.log
          exit 0

      - name: Upload verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wowii-145-lean-evidence-${{ github.run_id }}
          path: |
            lean-ci.log
            lean-source-sha256.txt
            lake-manifest.json
          if-no-files-found: warn

      - name: Fail job when Lean failed
        if: steps.verify.outputs.exit_status != '0'
        run: exit 1
