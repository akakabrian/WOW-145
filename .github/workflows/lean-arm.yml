name: Verify WOWII 145 ARM

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/lean-arm.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wow145-arm
  cancel-in-progress: true

jobs:
  verify-arm:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 90

    steps:
      - name: Check out reporting branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Publish ARM run-start marker
        shell: bash
        run: |
          set -euo pipefail
          printf 'run_id=%s\nrun_attempt=%s\nevent=%s\nworkflow_sha=%s\ncandidate_sha=%s\nstarted_utc=%s\n' \
            '${{ github.run_id }}' '${{ github.run_attempt }}' '${{ github.event_name }}' \
            '${{ github.sha }}' '172a16e75719b66d5cd68beae76fdae85253b16e' \
            "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > arm-ci-started.txt
          cp arm-ci-started.txt /tmp/arm-ci-started.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -f arm-ci-started.txt
          git commit -m 'ci: mark ARM Lean verification started' || true
          git push origin HEAD:main

      - name: Check out exact candidate
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin 172a16e75719b66d5cd68beae76fdae85253b16e
          git checkout --detach 172a16e75719b66d5cd68beae76fdae85253b16e
          cp /tmp/arm-ci-started.txt arm-ci-started.txt
          test "$(git rev-parse HEAD)" = '172a16e75719b66d5cd68beae76fdae85253b16e'

      - name: Install exact Lean toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf \
            https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Resolve pinned dependencies
        run: lake update

      - name: Restore ARM dependency build cache
        uses: actions/cache@v4
        with:
          path: .lake/packages/formal_conjectures/.lake/build
          key: wow145-arm-dependencies-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('lean-toolchain', 'lakefile.toml') }}

      - name: Download Mathlib cache
        run: lake exe cache get

      - name: Verify exact candidate
        id: verify
        shell: bash
        run: |
          set +e
          set -o pipefail
          {
            echo '$ lean --version'
            lean --version
            echo '$ git rev-parse HEAD'
            git rev-parse HEAD
            echo '$ forbidden-token and dependency scan'
            if grep -RInP '\b(sorry|admit|native_decide)\b|^[[:space:]]*axiom[[:space:]]|WOW146|wow_146' \
                WOW145 WOW145.lean lakefile.toml; then
              echo 'Forbidden shortcut or dependency found.'
              exit 1
            fi
            echo '$ source hashes'
            find WOW145 -type f -name '*.lean' -print0 \
              | sort -z \
              | xargs -0 sha256sum \
              | tee lean-arm-source-sha256.txt
            sha256sum WOW145.lean lean-toolchain lakefile.toml \
              | tee -a lean-arm-source-sha256.txt
            echo '$ lake build WOW145'
            lake build WOW145
            echo '$ lake env lean -DwarningAsError=true WOW145/Audit.lean'
            lake env lean -DwarningAsError=true WOW145/Audit.lean
            echo '$ lake --wfail build'
            lake --wfail build
          } > lean-arm-ci.log 2>&1
          status=$?
          echo "exit_status=$status" >> "$GITHUB_OUTPUT"
          printf '\nEXIT_STATUS=%s\n' "$status" >> lean-arm-ci.log
          exit 0

      - name: Upload ARM verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wowii-145-arm-evidence-${{ github.run_id }}
          path: |
            lean-arm-ci.log
            lean-arm-source-sha256.txt
            lake-manifest.json
            arm-ci-started.txt
          if-no-files-found: warn

      - name: Publish ARM compiler evidence
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          test -f lean-arm-ci.log && cp lean-arm-ci.log /tmp/lean-arm-ci.log || true
          test -f lean-arm-source-sha256.txt && cp lean-arm-source-sha256.txt /tmp/lean-arm-source-sha256.txt || true
          git reset --hard
          git clean -fdx
          git fetch origin main
          git checkout -B main origin/main
          cp /tmp/arm-ci-started.txt arm-ci-started.txt
          test -f /tmp/lean-arm-ci.log && cp /tmp/lean-arm-ci.log lean-arm-ci.log || true
          test -f /tmp/lean-arm-source-sha256.txt && cp /tmp/lean-arm-source-sha256.txt lean-arm-source-sha256.txt || true
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -f arm-ci-started.txt
          test -f lean-arm-ci.log && git add -f lean-arm-ci.log || true
          test -f lean-arm-source-sha256.txt && git add -f lean-arm-source-sha256.txt || true
          git commit -m 'ci: publish ARM Lean verification evidence' || true
          git push origin HEAD:main

      - name: Fail job when Lean failed
        if: steps.verify.outputs.exit_status != '0'
        run: exit 1
