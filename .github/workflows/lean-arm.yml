name: Verify WOWII 145 ARM

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/lean-arm.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wow145-arm
  cancel-in-progress: true

jobs:
  verify-arm:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 90

    steps:
      - name: Check out reporting branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Publish ARM run-start marker
        shell: bash
        run: |
          set -euo pipefail
          printf 'run_id=%s\nrun_attempt=%s\nevent=%s\nworkflow_sha=%s\ncandidate_sha=%s\nstarted_utc=%s\n' \
            '${{ github.run_id }}' '${{ github.run_attempt }}' '${{ github.event_name }}' \
            '${{ github.sha }}' 'bebf8938b85520d777ebec7c61e7466a7053d4fb' \
            "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > arm-ci-started.txt
          cp arm-ci-started.txt /tmp/arm-ci-started.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -f arm-ci-started.txt
          git commit -m 'ci: mark ARM Lean verification started' || true
          git push origin HEAD:main

      - name: Check out exact green candidate
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin bebf8938b85520d777ebec7c61e7466a7053d4fb
          git checkout --detach bebf8938b85520d777ebec7c61e7466a7053d4fb
          cp /tmp/arm-ci-started.txt arm-ci-started.txt
          test "$(git rev-parse HEAD)" = 'bebf8938b85520d777ebec7c61e7466a7053d4fb'

      - name: Install exact Lean toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf \
            https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Resolve pinned dependencies
        run: lake update

      - name: Restore ARM dependency build cache
        uses: actions/cache@v4
        with:
          path: .lake/packages/formal_conjectures/.lake/build
          key: wow145-arm-dependencies-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('lean-toolchain', 'lakefile.toml') }}

      - name: Download Mathlib cache
        run: lake exe cache get

      - name: Verify exact green candidate
        id: verify
        shell: bash
        run: |
          set +e
          set -o pipefail
          {
            echo '$ lean --version'
            lean --version
            echo '$ git rev-parse HEAD'
            git rev-parse HEAD
            echo '$ forbidden-token and dependency scan'
            if grep -RInP '\b(sorry|admit|native_decide)\b|^[[:space:]]*axiom[[:space:]]|WOW146|wow_146' \
                WOW145 WOW145.lean lakefile.toml; then
              echo 'Forbidden shortcut or dependency found.'
              exit 1
            fi
            echo '$ source hashes'
            find WOW145 -type f -name '*.lean' -print0 \
              | sort -z \
              | xargs -0 sha256sum \
              | tee lean-arm-source-sha256.txt
            sha256sum WOW145.lean lean-toolchain lakefile.toml \
              | tee -a lean-arm-source-sha256.txt
            echo '$ compare frozen x64 source hashes'
            cat > expected-source-sha256.txt <<'HASHES'
          f20a907d1a3e8617c0be3d38cf1852156f38e766323cd4f4967de9aa7c7b9b1d  WOW145/Audit.lean
          ec765a10f4e81af91d170dea9152b7f98071863fca2612fa7000416823652961  WOW145/Conjecture145.lean
          0d89d044e44010d76ad7761a6f3b0ebaf2077de12e6aebfdebc21e4c1d0b2b94  WOW145/ExceptionalCase.lean
          b1b735cac97aa8e848ef2bd17d55896e699494e41a3434cab8ca3d3eee362cd7  WOW145/ExceptionalConstruction.lean
          171720eacff2e223c6fa241cf454000aabd7ad619b1baba555c54914542eaec6  WOW145/GlobalBounds.lean
          2f9313dd51a2ba4e44982bfa39dffaf2ba619d6fa7f1088dcf9897502ae1b860  WOW145/Metric.lean
          2f0bd929ed253770a145b78a6a182c473a9489f53fb229cfa90b26e7ff6a5eec  WOW145/RadiusBridge.lean
          f1681f90595046af961e0d1f337aef8035343e21cfa2d23b1e99a0df3e086837  WOW145.lean
          d55ca0039a5479db5b38919d005b2c427b89b3be4f0184a20f2f4eae931f5bdb  lean-toolchain
          7d496e18de31255082ff18b610503eedd2dd815957785af1b7b2851f7d7ac951  lakefile.toml
          HASHES
            diff -u expected-source-sha256.txt lean-arm-source-sha256.txt
            echo '$ lake build WOW145'
            lake build WOW145
            echo '$ lake env lean -DwarningAsError=true WOW145/Audit.lean'
            lake env lean -DwarningAsError=true WOW145/Audit.lean
            echo '$ lake --wfail build'
            lake --wfail build
          } > lean-arm-ci.log 2>&1
          status=$?
          echo "exit_status=$status" >> "$GITHUB_OUTPUT"
          printf '\nEXIT_STATUS=%s\n' "$status" >> lean-arm-ci.log
          exit 0

      - name: Upload ARM verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wowii-145-arm-evidence-${{ github.run_id }}
          path: |
            lean-arm-ci.log
            lean-arm-source-sha256.txt
            expected-source-sha256.txt
            lake-manifest.json
            arm-ci-started.txt
          if-no-files-found: warn

      - name: Publish ARM compiler evidence
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          test -f lean-arm-ci.log && cp lean-arm-ci.log /tmp/lean-arm-ci.log || true
          test -f lean-arm-source-sha256.txt && cp lean-arm-source-sha256.txt /tmp/lean-arm-source-sha256.txt || true
          git reset --hard
          git clean -fdx
          git fetch origin main
          git checkout -B main origin/main
          cp /tmp/arm-ci-started.txt arm-ci-started.txt
          test -f /tmp/lean-arm-ci.log && cp /tmp/lean-arm-ci.log lean-arm-ci.log || true
          test -f /tmp/lean-arm-source-sha256.txt && cp /tmp/lean-arm-source-sha256.txt lean-arm-source-sha256.txt || true
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -f arm-ci-started.txt
          test -f lean-arm-ci.log && git add -f lean-arm-ci.log || true
          test -f lean-arm-source-sha256.txt && git add -f lean-arm-source-sha256.txt || true
          git commit -m 'ci: publish ARM Lean verification evidence' || true
          git push origin HEAD:main

      - name: Fail job when Lean failed
        if: steps.verify.outputs.exit_status != '0'
        run: exit 1
